<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>اختبار الجذور النفسية | Psychological Roots Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        body { font-family: 'Cairo', 'Inter', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); }
        .mobile-card { min-height: calc(100vh - 4rem - var(--safe-top) - var(--safe-bottom)); }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        button { touch-action: manipulation; }
        .btn-option:active { transform: scale(0.98); background-color: #eff6ff; }
    </style>
</head>
<body class="antialiased text-slate-900">

<div id="app" class="max-w-md mx-auto min-h-screen flex flex-col justify-center p-4 md:p-6 fade-in">
    <!-- Lang Toggle -->
    <div class="flex justify-between items-center mb-6 pt-[var(--safe-top)]">
        <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Mastermind CTO v1.1</span>
        <button onclick="toggleLanguage()" id="langBtn" class="bg-white/50 backdrop-blur px-4 py-1.5 rounded-full border border-slate-200 text-sm font-bold text-blue-600 shadow-sm">English</button>
    </div>

    <!-- Main Container -->
    <div class="bg-white rounded-[2rem] shadow-2xl shadow-blue-900/5 p-6 md:p-8 relative overflow-hidden border border-white">
        
        <!-- Intro Screen -->
        <div id="intro" class="text-center py-4">
            <div class="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
            </div>
            <h1 id="title" class="text-2xl font-extrabold text-slate-800 mb-4 leading-tight">رحلة استكشاف الذات</h1>
            <p id="description" class="text-slate-500 mb-8 leading-relaxed">فهم جذور الماضي هو مفتاح التوازن في الحاضر. اختبار نفسي عميق مبني على معايير دولية.</p>
            <button onclick="startTest()" class="bg-blue-600 text-white w-full py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all active:scale-[0.97]">ابدأ الآن</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz" class="hidden">
            <div class="flex items-center justify-between mb-6">
                <div id="stageLabel" class="text-xs font-bold px-3 py-1 bg-slate-100 rounded-full text-slate-600">المرحلة: الطفولة</div>
                <span id="progressText" class="text-xs font-bold text-blue-600">1 / 10</span>
            </div>
            
            <div class="w-full bg-slate-100 h-1.5 rounded-full mb-8 overflow-hidden">
                <div id="progressBar" class="bg-blue-500 h-full transition-all duration-500 ease-out" style="width: 10%"></div>
            </div>

            <h2 id="questionText" class="text-xl font-bold text-slate-800 mb-8 leading-snug">السؤال يظهر هنا</h2>

            <div id="options" class="space-y-3">
                <!-- Buttons injected -->
            </div>

            <div class="mt-10 flex items-center justify-start">
                <button id="prevBtn" onclick="goBack()" class="flex items-center text-slate-400 font-bold text-sm hover:text-slate-600 transition">
                    <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    <span id="prevText">السابق</span>
                </button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result" class="hidden">
            <h2 id="resultTitle" class="text-2xl font-bold text-slate-800 mb-6 border-b pb-4">تحليل الجذور</h2>
            <div id="resultContent" class="space-y-4"></div>
            
            <div class="mt-8 p-5 bg-emerald-50 rounded-2xl border border-emerald-100">
                <h3 id="brightSideTitle" class="text-emerald-800 font-bold flex items-center mb-2">
                    <svg class="w-5 h-5 ml-2" fill="currentColor" viewBox="0 0 20 20"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.477.859h4z"></path></svg>
                    الجانب المشرق
                </h3>
                <p id="brightSideText" class="text-emerald-700 text-sm leading-relaxed italic"></p>
            </div>

            <button onclick="location.reload()" class="mt-8 w-full py-4 text-slate-400 font-bold text-sm hover:text-slate-600 transition">إعادة المحاولة</button>
        </div>
    </div>

    <!-- Footer Security Notice -->
    <p class="text-center mt-8 text-[10px] text-slate-400 uppercase tracking-widest px-4">
        🔒 تم معالجة البيانات محلياً. خصوصيتك محمية بموجب بروتوكول CTO Zero-Data.
    </p>
</div>

<script>
    // [The logic from the previous version is kept intact but with updated UI mappings]
    const translations = {
        ar: {
            title: "رحلة استكشاف الذات",
            description: "فهم جذور الماضي هو مفتاح التوازن في الحاضر. اختبار نفسي عميق مبني على معايير دولية.",
            start: "ابدأ الآن", prev: "السابق", stageC: "المرحلة: الطفولة", stageA: "المرحلة: المراهقة",
            childhood: "تأثير الطفولة", adolescence: "تأثير المراهقة",
            severityL: "خفيف", severityM: "متوسط", severityH: "عميق",
            confirmTitle: "الارتباط بالحاضر:",
            confirmText: "هل تجد هذا النمط ينطبق على علاقتك الحالية بعائلتك؟",
            brightSide: "الوعي هو نصف العلاج. أنت الآن تملك الخريطة للبدء في تطهير هذه المساحات وبناء حياة عائلية ملؤها الأمان والسلام النفسي."
        },
        en: {
            title: "Self-Discovery Journey",
            description: "Understanding past roots is the key to present balance. A deep psychological test based on international standards.",
            start: "Start Now", prev: "Previous", stageC: "Stage: Childhood", stageA: "Stage: Adolescence",
            childhood: "Childhood Impact", adolescence: "Adolescence Impact",
            severityL: "Low", severityM: "Mid", severityH: "Deep",
            confirmTitle: "Present Correlation:",
            confirmText: "Do you find this pattern applies to your current family relationships?",
            brightSide: "Awareness is half the cure. You now hold the map to start purifying these spaces and building a family life full of security and inner peace."
        }
    };

    let currentLang = 'ar';
    let currentStep = 0;
    let userAnswers = [];

    const questions = [
        { id: 1, stage: 'childhood', ar: "هل شعرت بأن احتياجاتك العاطفية كانت مُلباة من قبل والديك؟", en: "Did you feel your emotional needs were met by your parents?", weight: 1, inverse: true },
        { id: 2, stage: 'childhood', ar: "هل تعرضت لنقد قاسٍ ومستمر في سنواتك الأولى؟", en: "Were you subjected to harsh, constant criticism in your early years?", weight: 1 },
        { id: 3, stage: 'childhood', ar: "هل كانت هناك مخاوف من التعبير عن مشاعرك الحقيقية؟", en: "Were there fears of expressing your true feelings?", weight: 1 },
        { id: 4, stage: 'childhood', ar: "هل شعرت بأنك تحمل مسؤوليات أكبر من سنك؟", en: "Did you feel you carried responsibilities beyond your age?", weight: 1 },
        { id: 5, stage: 'childhood', ar: "هل شعرت بالحماية والأمان الجسدي في بيئتك؟", en: "Did you feel physically safe and protected in your environment?", weight: 1, inverse: true },
        { id: 6, stage: 'adolescence', ar: "هل شعرت بالعزلة أو عدم الانتماء في محيطك الاجتماعي؟", en: "Did you feel isolated or like you didn't belong in your social circle?", weight: 1 },
        { id: 7, stage: 'adolescence', ar: "هل كان هناك ضغط شديد لتحقيق التوقعات دون مراعاة لرغباتك؟", en: "Was there intense pressure to meet expectations regardless of your wishes?", weight: 1 },
        { id: 8, stage: 'adolescence', ar: "هل واجهت صعوبة في وضع حدود شخصية مع الآخرين؟", en: "Did you struggle to set personal boundaries with others?", weight: 1 },
        { id: 9, stage: 'adolescence', ar: "هل شعرت بأن صوتك كان مسموعاً ومحترماً في العائلة؟", en: "Did you feel your voice was heard and respected in the family?", weight: 1, inverse: true },
        { id: 10, stage: 'adolescence', ar: "هل كانت هناك صراعات مستمرة داخل المنزل أثرت على استقرارك؟", en: "Were there constant conflicts at home that affected your stability?", weight: 1 }
    ];

    function toggleLanguage() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        document.documentElement.lang = currentLang;
        document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        document.getElementById('langBtn').innerText = currentLang === 'ar' ? 'English' : 'عربي';
        updateContent();
    }

    function updateContent() {
        const t = translations[currentLang];
        document.getElementById('title').innerText = t.title;
        document.getElementById('description').innerText = t.description;
        document.getElementById('prevText').innerText = t.prev;
        if(currentStep < questions.length) renderQuestion();
    }

    function startTest() {
        document.getElementById('intro').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        const q = questions[currentStep];
        const t = translations[currentLang];
        document.getElementById('stageLabel').innerText = q.stage === 'childhood' ? t.stageC : t.stageA;
        document.getElementById('progressText').innerText = `${currentStep + 1} / 10`;
        document.getElementById('progressBar').style.width = `${(currentStep + 1) * 10}%`;
        document.getElementById('questionText').innerText = q[currentLang];
        
        const options = [
            { text: currentLang === 'ar' ? 'دائماً' : 'Always', val: 3 },
            { text: currentLang === 'ar' ? 'غالباً' : 'Often', val: 2 },
            { text: currentLang === 'ar' ? 'نادراً' : 'Rarely', val: 1 },
            { text: currentLang === 'ar' ? 'أبداً' : 'Never', val: 0 }
        ];

        document.getElementById('options').innerHTML = options.map(opt => `
            <button onclick="answer(${opt.val})" class="btn-option w-full text-start p-4 border border-slate-100 rounded-2xl hover:border-blue-300 hover:shadow-sm transition-all font-semibold text-slate-700 bg-slate-50/50">
                ${opt.text}
            </button>
        `).join('');
        document.getElementById('prevBtn').style.opacity = currentStep > 0 ? '1' : '0';
    }

    function answer(val) {
        const q = questions[currentStep];
        userAnswers[currentStep] = q.inverse ? (3 - val) : val;
        if (currentStep < questions.length - 1) {
            currentStep++;
            renderQuestion();
        } else {
            showResults();
        }
    }

    function goBack() { if (currentStep > 0) { currentStep--; renderQuestion(); } }

    function showResults() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        
        const cScore = userAnswers.slice(0, 5).reduce((a, b) => a + b, 0);
        const aScore = userAnswers.slice(5, 10).reduce((a, b) => a + b, 0);
        
        const t = translations[currentLang];
        const getSev = (s) => {
            if (s <= 5) return { l: t.severityL, c: 'text-emerald-600', bg: 'bg-emerald-50' };
            if (s <= 10) return { l: t.severityM, c: 'text-amber-600', bg: 'bg-amber-50' };
            return { l: t.severityH, c: 'text-rose-600', bg: 'bg-rose-50' };
        }

        const cSev = getSev(cScore);
        const aSev = getSev(aScore);

        let pattern = (cScore + aScore > 18) 
            ? (currentLang === 'ar' ? "نمط 'الحماية الزائدة' أو الحذر العاطفي في العلاقات." : "Pattern of 'Over-protection' or emotional caution in relationships.")
            : (currentLang === 'ar' ? "نمط 'الاستقرار المرن' مع وعي جيد بالحدود." : "Pattern of 'Resilient Stability' with good boundary awareness.");

        document.getElementById('resultContent').innerHTML = `
            <div class="grid grid-cols-2 gap-3">
                <div class="p-4 ${cSev.bg} rounded-2xl text-center">
                    <span class="text-[10px] uppercase font-bold text-slate-400 block mb-1">${t.childhood}</span>
                    <span class="text-lg font-extrabold ${cSev.c}">${cSev.l}</span>
                </div>
                <div class="p-4 ${aSev.bg} rounded-2xl text-center">
                    <span class="text-[10px] uppercase font-bold text-slate-400 block mb-1">${t.adolescence}</span>
                    <span class="text-lg font-extrabold ${aSev.c}">${aSev.l}</span>
                </div>
            </div>
            <div class="p-6 bg-slate-50 rounded-2xl border border-slate-100 mt-4">
                <h4 class="text-xs font-bold text-slate-400 uppercase mb-3">${t.confirmTitle}</h4>
                <p class="text-slate-800 font-bold mb-4">${pattern}</p>
                <div class="flex gap-2">
                    <button onclick="this.parentElement.innerHTML='<p class=\'text-emerald-600 font-bold text-sm\'>✓ تم التأكيد</p>'" class="flex-1 py-2 bg-white border border-slate-200 rounded-xl text-xs font-bold shadow-sm">نعم، ينطبق</button>
                    <button onclick="this.parentElement.innerHTML='<p class=\'text-slate-400 font-bold text-sm\'>تم الحفظ</p>'" class="flex-1 py-2 bg-white border border-slate-200 rounded-xl text-xs font-bold shadow-sm">ليس دقيقاً</button>
                </div>
            </div>
        `;
        document.getElementById('brightSideText').innerText = t.brightSide;
    }
</script>
</body>
</html>
