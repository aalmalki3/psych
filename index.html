<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>مقياس الجذور النفسية v1.5 | Psychological Depth Scale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #fdfdfe; color: #1e293b; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border: 1px solid #e2e8f0; }
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .btn-opt { transition: all 0.2s ease; border: 2px solid #f1f5f9; text-align: right; width: 100%; padding: 1.1rem; border-radius: 1rem; font-weight: 700; background: white; }
        .btn-opt:hover { border-color: #3b82f6; background: #eff6ff; transform: translateX(-4px); }
        .advice-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 1.5rem; padding: 1.5rem; transition: all 0.3s ease; }
        .advice-card:hover { border-color: #3b82f6; box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="antialiased">

<div id="app" class="min-h-screen flex flex-col items-center py-6 md:py-12 px-4">
    <main class="w-full max-w-4xl glass-card rounded-[3rem] shadow-xl p-6 md:p-16 min-h-[550px] relative overflow-hidden">
        
        <!-- Intro -->
        <div id="intro" class="text-center py-10 fade-in">
            <h2 class="text-3xl md:text-4xl font-black text-slate-800 mb-6 leading-tight">التحليل النفسي <span class="text-blue-600">لآثار الماضي</span></h2>
            <p class="text-lg text-slate-500 mb-10 max-w-xl mx-auto italic">"وعيك بجذورك هو الخطوة الأولى لبناء مستقبل عائلي أكثر أماناً."</p>
            <button onclick="startTest()" class="bg-blue-600 text-white px-10 py-5 rounded-2xl font-bold text-lg shadow-xl active:scale-95 transition-all">ابدأ رحلة الاستكشاف</button>
        </div>

        <!-- Quiz Container -->
        <div id="quiz" class="hidden fade-in">
            <div class="flex items-center justify-between mb-8">
                <span id="stageText" class="font-bold text-blue-600 bg-blue-50 px-4 py-2 rounded-xl text-sm">المرحلة: جاري التحليل</span>
                <span id="progressNum" class="text-xl font-black text-slate-300">01 / 15</span>
            </div>
            <h3 id="questionText" class="text-2xl font-bold text-slate-800 mb-10 leading-relaxed min-h-[100px]"></h3>
            <div id="options" class="space-y-3"></div>
            <div class="mt-10 pt-6 border-t flex justify-between items-center">
                <button id="prevBtn" onclick="goBack()" class="text-slate-300 font-bold hover:text-slate-600 transition">السابق</button>
                <div class="w-48 bg-slate-100 h-1.5 rounded-full overflow-hidden">
                    <div id="pBar" class="bg-blue-600 h-full transition-all duration-700" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result" class="hidden fade-in">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-black text-slate-800 mb-2">التقرير النهائي</h2>
                <p class="text-slate-400">تحليل الميول والأنماط النفسية بناءً على تاريخ النمو</p>
            </div>
            
            <div id="symptomList" class="space-y-6 mb-12"></div>
            
            <div id="confirmResult" class="p-8 bg-slate-900 rounded-[2.5rem] text-white text-center mb-10 shadow-2xl">
                <h4 class="text-xl font-bold mb-4">هل تشعر أن هذه النتائج متسقة مع تجربتك؟</h4>
                <div class="flex flex-col md:flex-row justify-center gap-3">
                    <button onclick="revealAdvice()" class="bg-blue-600 px-8 py-3 rounded-xl font-bold hover:bg-blue-500 transition">نعم، دقيق جداً</button>
                    <button onclick="revealAdvice()" class="bg-slate-800 px-8 py-3 rounded-xl font-bold hover:bg-slate-700 transition border border-slate-700">إلى حد ما</button>
                </div>
            </div>

            <!-- Advice Section (New Layout) -->
            <div id="adviceSec" class="hidden fade-in space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="advice-card border-blue-100 bg-blue-50/30">
                        <h5 class="font-black text-blue-700 mb-3 flex items-center">
                            <span class="w-2 h-6 bg-blue-600 ml-2 rounded-full"></span> فهم الشعور
                        </h5>
                        <p id="advUnderstanding" class="text-sm text-slate-600 leading-relaxed"></p>
                    </div>
                    <div class="advice-card border-amber-100 bg-amber-50/30">
                        <h5 class="font-black text-amber-700 mb-3 flex items-center">
                            <span class="w-2 h-6 bg-amber-500 ml-2 rounded-full"></span> التعامل معه
                        </h5>
                        <p id="advCoping" class="text-sm text-slate-600 leading-relaxed"></p>
                    </div>
                </div>
                <div class="advice-card border-emerald-100 bg-emerald-50/30 col-span-1 md:col-span-2">
                    <h5 class="font-black text-emerald-700 mb-4 flex items-center text-lg">
                        <span class="w-2 h-8 bg-emerald-600 ml-2 rounded-full"></span> حماية أسرتك (قطع دائرة الألم)
                    </h5>
                    <div id="advFamily" class="text-sm text-slate-700 leading-relaxed space-y-3"></div>
                </div>
                <button onclick="location.reload()" class="w-full py-6 text-slate-400 font-bold hover:text-blue-600 transition text-sm italic">إعادة تقييم الرحلة</button>
            </div>
        </div>
    </main>
</div>

<script>
    let curStep = 0;
    let answers = [];

    const categories = [
        { id: 0, name: "القلق والتوتر", info: "يتعلق بالمخاوف المستقبلية والبحث عن الأمان." },
        { id: 1, name: "الرهاب الاجتماعي", info: "يتعلق بالخوف من النقد وتجنب الظهور." },
        { id: 2, name: "تقدير الذات والاكتئاب", info: "يتعلق بالشعور بالنقص وفقدان الحافز." },
        { id: 3, name: "آثار الصدمات (PTSD)", info: "يتعلق بذكريات الماضي التي تقتحم الحاضر." },
        { id: 4, name: "الاحتراق النفسي", info: "يتعلق بتحمل أعباء عاطفية تفوق الطاقة." }
    ];

    const questions = [
        { cat: 0, q: "هل شعرت في طفولتك أنك مضطر لتوقع الأسوأ دائماً؟", inv: false },
        { cat: 1, q: "هل كان تعرضك للنقد أمام الآخرين يسبب لك ألماً شديداً؟", inv: false },
        { cat: 2, q: "هل تشعر حالياً أن قيمتك تعتمد على مدى إرضائك للآخرين؟", inv: false },
        { cat: 3, q: "هل هناك أحداث قديمة تجعل عقلك يتجمد عند تذكرها؟", inv: false },
        { cat: 4, q: "هل كنت 'المستمع الصبور' لمشاكل الكبار وأنت لا تزال طفلاً؟", inv: false },
        { cat: 0, q: "هل كنت تجد مكاناً آمناً تماماً تهرب إليه عندما تخاف؟", inv: true },
        { cat: 3, q: "هل تعاني من توتر جسدي مفاجئ دون سبب واضح؟", inv: false },
        { cat: 1, q: "هل تتجنب المناسبات الاجتماعية خوفاً من أن يُساء فهمك؟", inv: false },
        { cat: 4, q: "هل تشعر بالذنب إذا فكرت في راحتك قبل راحة أهلك؟", inv: false },
        { cat: 2, q: "هل يراودك صوت داخلي يخبرك بأنك 'فاشل' عند الخطأ؟", inv: false },
        { cat: 0, q: "هل تشعر بالخوف من الهجر أو فقدان من تحب فجأة؟", inv: false },
        { cat: 1, q: "هل كان مسموحاً لك التعبير عن رأيك بحرية في منزلك؟", inv: true },
        { cat: 2, q: "هل فقدت الرغبة في خوض تحديات جديدة خوفاً من الإخفاق؟", inv: false },
        { cat: 3, q: "هل تبالغ في رد فعلك تجاه مواقف بسيطة تشبه الماضي؟", inv: false },
        { cat: 4, q: "هل تشعر بمسؤولية ثقيلة عن مشاكل لم تكن أنت سببها؟", inv: false }
    ];

    function startTest() {
        document.getElementById('intro').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        renderQ();
    }

    function renderQ() {
        const q = questions[curStep];
        document.getElementById('progressNum').innerText = `${curStep + 1} / 15`;
        document.getElementById('pBar').style.width = `${((curStep + 1) / 15) * 100}%`;
        document.getElementById('questionText').innerText = q.q;
        const opts = ["دائماً", "غالباً", "أحياناً", "نادراً", "أبداً"];
        document.getElementById('options').innerHTML = opts.map((o, i) => `
            <button onclick="handleAns(${4-i})" class="btn-opt shadow-sm">${o}</button>
        `).join('');
        document.getElementById('prevBtn').style.opacity = curStep > 0 ? '1' : '0';
    }

    function handleAns(val) {
        answers[curStep] = questions[curStep].inv ? (4 - val) : val;
        if (curStep < questions.length - 1) { curStep++; renderQ(); } 
        else { showFinal(); }
    }

    function goBack() { if(curStep > 0) { curStep--; renderQ(); } }

    function showFinal() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        const results = categories.map(cat => {
            const score = questions.reduce((acc, q, i) => q.cat === cat.id ? acc + (answers[i] || 0) : acc, 0);
            return { ...cat, score };
        }).sort((a, b) => b.score - a.score);

        document.getElementById('symptomList').innerHTML = results.map(res => {
            const p = (res.score / 12) * 100;
            const lvl = p < 35 ? 'مستقر' : p < 70 ? 'متأثر' : 'مرتفع الأثر';
            const clr = p < 35 ? 'bg-emerald-500' : p < 70 ? 'bg-amber-500' : 'bg-rose-500';
            return `
                <div class="fade-in">
                    <div class="flex justify-between mb-2 font-bold text-sm">
                        <span>${res.name}</span>
                        <span class="${p < 35 ? 'text-emerald-600' : p < 70 ? 'text-amber-600' : 'text-rose-600'}">${lvl}</span>
                    </div>
                    <div class="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden">
                        <div class="h-full ${clr} transition-all duration-1000" style="width: ${p}%"></div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function revealAdvice() {
        document.getElementById('confirmResult').classList.add('hidden');
        document.getElementById('adviceSec').classList.remove('hidden');
        
        document.getElementById('advUnderstanding').innerText = "عقلك لا زال يستخدم 'دفاعات الطفولة' لحمايتك في بيئة لم تعد تهددك. اعترف بهذا الطفل داخلك، واشكره على محاولته حمايتك، لكن أخبره أنك الآن ناضج ومسيطر.";
        
        document.getElementById('advCoping').innerText = "عند الشعور بالتوتر، استخدم قاعدة (5-4-3-2-1): سمِّ 5 أشياء تراها، 4 تلمسها، 3 تسمعها، 2 تشمها، وواحد تتذوقه. هذا سيسحب وعيك من الماضي إلى الحاضر فوراً.";
        
        document.getElementById('advFamily').innerHTML = `
            <div class="space-y-4">
                <p><strong>1. التواصل الصادق:</strong> عندما تشعر بضيق ناتج عن 'محفز قديم'، أخبر عائلتك: <em>'أنا أشعر بالضغط الآن بسبب شيء يخصني، وليس بسببكم. أحتاج 10 دقائق من الهدوء'</em>. هذا يحميهم من الشعور بالذنب.</p>
                <p><strong>2. النمذجة العاطفية:</strong> أظهر لأطفالك أن التعبير عن الضعف ليس فشلاً. عندما يروك تتعامل مع مشاعرك بهدوء، سيتعلمون أن المشاعر ليست مخيفة.</p>
                <p><strong>3. الاحتواء قبل العطاء:</strong> لا تحاول أن تكون 'كاملاً' مع أسرتك. الطفل يحتاج إلى والد 'حاضر عاطفياً' أكثر من والد 'يؤدي المهام'. أعطِ نفسك حق الخطأ لتسمح لهم به أيضاً.</p>
                <p><strong>4. بناء بيئة 'القبول غير المشروط':</strong> اقطع سلسلة النقد التي عانيت منها. اجعل منزلك مكاناً يُقبل فيه الفرد لذاته، لا لإنجازاته فقط.</p>
            </div>
        `;
        window.scrollTo({ top: document.getElementById('adviceSec').offsetTop, behavior: 'smooth' });
    }
</script>
</body>
</html>
